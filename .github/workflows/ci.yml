name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: uv run inv format --check

  test-unit:
    name: test-unit
    needs: lint
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit -v --durations=10

  build-controller-image:
    name: build-controller-image
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read image version
        id: version
        run: echo "tag=$(cat docker/controller.version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker
          file: docker/Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/seekr-technologies/seekr-chain-controller:${{ steps.version.outputs.tag }}
            ghcr.io/seekr-technologies/seekr-chain-controller:latest

  test-integration:
    name: test-integration
    needs: [test-unit, build-controller-image]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install k3d
        run: |
          curl -fsSL -o k3d-linux-amd64 https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64
          echo "dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e  k3d-linux-amd64" | sha256sum -c
          chmod +x k3d-linux-amd64 && sudo mv k3d-linux-amd64 /usr/local/bin/k3d

      - name: Install kubectl
        run: |
          curl -fsSLO https://dl.k8s.io/release/v1.32.3/bin/linux/amd64/kubectl
          echo "ab209d0c5134b61486a0486585604a616a5bb2fc07df46d304b3c95817b2d79f  kubectl" | sha256sum -c
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install argo CLI
        run: ARGO_VERSION=v3.6.7 bash scripts/install-argo.sh

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Docker Hub login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Run integration tests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          export RUN_TESTS="uv run pytest tests/integration -v -n 4 --durations=10 -s"
          $RUN_TESTS || true
          $RUN_TESTS --last-failed --last-failed-no-failures=none || [ $? -eq 5 ]
