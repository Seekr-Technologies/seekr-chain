name: Build Init Image

on:
  workflow_dispatch:

permissions: read-all

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read image version
        id: version
        run: echo "tag=$(cat docker/init.version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse if tag already exists
        run: |
          TAG="ghcr.io/seekr-technologies/seekr-chain-init:${{ steps.version.outputs.tag }}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "Error: $TAG already exists."
            echo "Bump docker/init.version before building a new image."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: docker
          file: docker/Dockerfile.init
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/seekr-technologies/seekr-chain-init:${{ steps.version.outputs.tag }}
            ghcr.io/seekr-technologies/seekr-chain-init:latest
