name: Build Init Image

on:
  workflow_dispatch:

permissions: read-all

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read image version
        id: version
        run: echo "tag=$(cat docker/init.version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse if tag already exists
        run: |
          TAG="ghcr.io/seekr-technologies/seekr-chain-init:${{ steps.version.outputs.tag }}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "Error: $TAG already exists."
            echo "Bump docker/init.version before building a new image."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker
          file: docker/Dockerfile.init
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/seekr-technologies/seekr-chain-init:${{ steps.version.outputs.tag }}
            ghcr.io/seekr-technologies/seekr-chain-init:latest
