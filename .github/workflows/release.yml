name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  compute-version:
    name: Compute next version
    if: github.event.forced == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      next_version: ${{ steps.compute.outputs.next_version }}
      skip_release: ${{ steps.compute.outputs.skip_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -eu

          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

          echo "Latest tag: $LATEST_TAG"

          # Enumerate all commits in this push (handles merge train batches)
          PUSH_COMMITS=$(git log --format="%H" "${GITHUB_EVENT_BEFORE}..${GITHUB_SHA}" 2>/dev/null || echo "")
          if [ -z "$PUSH_COMMITS" ]; then
            PUSH_COMMITS="$GITHUB_SHA"
          fi

          echo "Commits in this push:"
          echo "$PUSH_COMMITS"

          # Find all PRs associated with commits in this push
          PR_NUMBERS=""
          for SHA in $PUSH_COMMITS; do
            # Try GitHub API first (retry for propagation delay on the first commit)
            NUM=""
            for attempt in 1 2 3; do
              NUM=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" --jq '.[0].number' 2>/dev/null || echo "")
              if [ -n "$NUM" ] && [ "$NUM" != "null" ]; then
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "PR not yet indexed for $SHA, retrying in 10s (attempt $attempt/3)..."
                sleep 10
              fi
            done

            # Fallback: parse PR number from squash-merge commit message "(#N)"
            if [ -z "$NUM" ] || [ "$NUM" = "null" ]; then
              COMMIT_MSG=$(git log -1 --format='%s' "$SHA")
              NUM=$(echo "$COMMIT_MSG" | grep -oE '\(#[0-9]+\)$' | grep -oE '[0-9]+' || echo "")
              if [ -n "$NUM" ]; then
                echo "Extracted PR number from commit message for $SHA: #$NUM"
              fi
            fi

            if [ -n "$NUM" ] && [ "$NUM" != "null" ]; then
              PR_NUMBERS="$PR_NUMBERS $NUM"
            fi
          done

          PR_NUMBERS=$(echo "$PR_NUMBERS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "PRs in this push: $PR_NUMBERS"

          # Skip if no PR is associated (e.g. a direct push to main)
          if [ -z "$(echo "$PR_NUMBERS" | tr -d ' ')" ]; then
            echo "No PRs found for this push, skipping release"
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch all commit subjects from all PRs in this push
          ALL_COMMITS=""
          for PR in $PR_NUMBERS; do
            COMMITS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/commits" \
              --paginate --jq '.[].commit.message | split("\n")[0]')
            ALL_COMMITS=$(printf '%s\n%s' "$ALL_COMMITS" "$COMMITS")
          done

          echo "All commits across PRs in this push:"
          echo "$ALL_COMMITS"

          bump_level() {
            MSG="$1"
            if   echo "$MSG" | grep -qE '^[a-z]+(\([^)]+\))?!:';                         then echo 3
            elif echo "$MSG" | grep -qE '^feat(\([^)]+\))?:';                             then echo 2
            elif echo "$MSG" | grep -qE '^(fix|perf|refactor|revert|test)(\([^)]+\))?:'; then echo 1
            else echo 0
            fi
          }

          # no-bump escape hatch: filter out no-bump commits individually so a
          # no-bump PR in a merge train batch doesn't suppress a feat PR in the same batch
          EFFECTIVE_COMMITS=$(echo "$ALL_COMMITS" | grep -vE '^no-bump(\([^)]+\))?:' || true)

          MAX_LEVEL=0
          while IFS= read -r TITLE; do
            [ -z "$TITLE" ] && continue
            LEVEL=$(bump_level "$TITLE")
            [ "$LEVEL" -gt "$MAX_LEVEL" ] && MAX_LEVEL=$LEVEL
          done <<< "$EFFECTIVE_COMMITS"

          case "$MAX_LEVEL" in
            3) BUMP="major" ;;
            2) BUMP="minor" ;;
            1) BUMP="patch" ;;
            0) BUMP="none"  ;;
          esac

          echo "Bump type: $BUMP"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            none)  ;;
          esac

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$BUMP" = "none" ]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release: version stays at $LATEST_TAG"
          else
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    name: Create release
    needs: compute-version
    if: needs.compute-version.outputs.skip_release == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NEXT_VERSION: ${{ needs.compute-version.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Tag and push
        run: |
          git tag -a "$NEXT_VERSION" -m "Release $NEXT_VERSION"
          git push origin "$NEXT_VERSION"

      - name: Create GitHub Release
        run: gh release create "$NEXT_VERSION" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: create-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
